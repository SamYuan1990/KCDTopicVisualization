name: Deploy Landscape2 to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'   ← 已删除，因为项目中没有锁文件

      - name: Install landscape2
        run: npm install -g @cncf/landscape2

      - name: Build landscape
        run: |
          landscape2 build \
            --data-file result.yml \
            --settings-file settings.yml \
            --guide-file guide.yml \
            --logos-path ./hosted_logos \
            --output-dir build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4